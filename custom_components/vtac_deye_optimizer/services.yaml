replan:
  name: Replan
  description: Rebuild the optimizer schedule without writing inverter settings.

apply_current:
  name: Apply current plan
  description: Apply the currently planned slot to the Deye inverter.

force_mode:
  name: Force mode
  description: Apply a temporary mode immediately.
  fields:
    mode:
      name: Mode
      required: true
      selector:
        select:
          options:
            - charge
            - export
            - idle
            - self_consumption
    minutes:
      name: Minutes
      default: 60
      selector:
        number:
          min: 1
          max: 240
          unit_of_measurement: min
